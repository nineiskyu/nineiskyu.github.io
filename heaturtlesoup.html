<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>代購清單確認</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
        background: #f5f6fb;
        color: #333;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .title {
        text-align: center;
        font-size: 32px;
        margin: 0 0 24px;
        color: #222;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .search-input {
        width: 100%;
        max-width: 420px;
        padding: 12px 16px;
        border: 1px solid #d9dce7;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        background: #fff;
      }

      .search-input:focus {
        border-color: #7a8cff;
        box-shadow: 0 0 0 4px rgba(122, 140, 255, 0.12);
      }

      .clear-btn {
        padding: 12px 18px;
        border: none;
        border-radius: 12px;
        background: #222;
        color: #fff;
        cursor: pointer;
        font-size: 15px;
      }

      .clear-btn:hover {
        opacity: 0.9;
      }

      .result-text {
        text-align: center;
        color: #666;
        margin-bottom: 20px;
        font-size: 15px;
      }

      .card-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 22px;
      }

      .order-card {
        background: #fff;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid #ececf3;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
        font-size: 16px;
      }

      .label {
        color: #666;
        flex-shrink: 0;
      }

      .value {
        color: #111;
        text-align: right;
        word-break: break-word;
      }

      .number {
        font-weight: 700;
        color: #555;
      }

      .name {
        font-weight: 700;
        color: #111;
      }

      .final-payment {
        color: #d93025;
        font-weight: 700;
      }

      .divider {
        border: none;
        border-top: 1px dashed #cfcfda;
        margin: 16px 0;
      }

      .item-list,
      .card-info-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        line-height: 1.5;
      }

      .item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        flex-shrink: 0;
        cursor: pointer;
      }

      .item-text {
        flex: 1;
        word-break: break-word;
      }

      .item.done .item-text {
        color: #999;
        text-decoration: line-through;
      }

      .empty-text,
      .loading-text,
      .error-text {
        text-align: center;
        color: #999;
        padding: 40px 20px;
        background: #fff;
        border-radius: 18px;
        border: 1px solid #ececf3;
      }

      .error-text {
        color: #d93025;
      }

      @media (max-width: 576px) {
        .title {
          font-size: 26px;
        }

        .order-card {
          padding: 18px;
        }

        .info-row {
          font-size: 15px;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .search-input,
        .clear-btn {
          max-width: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">代購清單</h1>

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="請輸入名稱搜尋:ex 圭圭企鵝,東海小老虎"
        />
        <button type="button" class="clear-btn" id="clearBtn">清除搜尋</button>
      </div>

      <div class="result-text" id="resultText">載入中...</div>
      <div id="cardList" class="card-list">
        <div class="loading-text">資料載入中...</div>
      </div>
    </div>

    <script>
      let orderData = [];

      const cardList = document.getElementById("cardList");
      const searchInput = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const resultText = document.getElementById("resultText");

      function formatMoney(num) {
        return Number(num).toLocaleString("zh-TW");
      }

      function groupItems(items) {
        const grouped = {};

        items.forEach((item) => {
          const match = item.match(/\$([\d,]+)/);
          const price = match ? Number(match[1].replace(/,/g, "")) : null;
          const name = item.replace(/\s*\$[\d,]+\s*$/, "").trim();
          const key = `${name}__${price ?? "no-price"}`;

          if (!grouped[key]) {
            grouped[key] = {
              name,
              price,
              qty: 1,
            };
          } else {
            grouped[key].qty += 1;
          }
        });

        return Object.values(grouped);
      }

      function createItemHtml(item) {
        let text = item.name;

        if (item.price !== null) {
          text += ` $${formatMoney(item.price)}`;
        }

        text += ` x ${item.qty}`;

        return `
        <label class="item">
          <input type="checkbox" onchange="toggleDone(this)">
          <span class="item-text">${text}</span>
        </label>
      `;
      }

      function createCardSection(order) {
        const sections = [];

        if (order.eventCard > 0) {
          sections.push(`
          <label class="item">
            <input type="checkbox" onchange="toggleDone(this)">
            <span class="item-text">場週滿額卡 x ${order.eventCard}</span>
          </label>
        `);
        }

        if (order.marketCard > 0) {
          sections.push(`
          <label class="item">
            <input type="checkbox" onchange="toggleDone(this)">
            <span class="item-text">超市滿額卡 x ${order.marketCard}</span>
          </label>
        `);
        }

        if (sections.length === 0) {
          return "";
        }

        return `
        <hr class="divider">
        <div class="card-info-list">
          ${sections.join("")}
        </div>
      `;
      }

      function createCardHtml(order, index) {
        const groupedItems = groupItems(order.items);

        return `
        <div class="order-card">
          <div class="info-row">
            <span class="label number">編號：</span>
            <span class="value number">${index + 1}</span>
          </div>

          <div class="info-row">
            <span class="label name">名稱：</span>
            <span class="value name">${order.name}</span>
          </div>

          <div class="info-row">
            <span class="label">總金額：</span>
            <span class="value">$${formatMoney(order.totalAmount)}</span>
          </div>

          <div class="info-row">
            <span class="label">已付訂金：</span>
            <span class="value">$${formatMoney(order.deposit)}</span>
          </div>

          <div class="info-row">
            <span class="label">尾款：</span>
            <span class="value final-payment">$${formatMoney(order.finalPayment)}</span>
          </div>

          <hr class="divider">

          <div class="item-list">
            ${groupedItems.map(createItemHtml).join("")}
          </div>

          ${createCardSection(order)}
        </div>
      `;
      }

      function toggleDone(el) {
        const item = el.closest(".item");
        item.classList.toggle("done", el.checked);
      }

      function getFilteredData(keyword) {
        const text = keyword.trim().toLowerCase();

        if (!text) {
          return orderData;
        }

        return orderData.filter((order) =>
          order.name.toLowerCase().includes(text),
        );
      }

      function renderOrders(keyword = "") {
        const filteredData = getFilteredData(keyword);

        resultText.textContent = `共 ${filteredData.length} 筆`;

        if (filteredData.length === 0) {
          cardList.innerHTML = `<div class="empty-text">找不到符合的名稱</div>`;
          return;
        }

        cardList.innerHTML = filteredData
          .map((order, index) => createCardHtml(order, index))
          .join("");
      }

      // async function loadData() {
      //   try {
      //     const response = await fetch("https://opensheet.elk.sh/1zKo5ALernti3UMF7fE6lmEivyDkDLoN0Iuq-kk63tDs/對帳單");

      //     if (!response.ok) {
      //       throw new Error("JSON 載入失敗");
      //     }

      //     orderData = await response.json();
      //     renderOrders();
      //   } catch (error) {
      //     resultText.textContent = "載入失敗";
      //     cardList.innerHTML = `<div class="error-text">無法讀取 product.json，請檢查檔案名稱與路徑是否正確。</div>`;
      //     console.error(error);
      //   }
      // }
      async function loadData() {
        const response = await fetch(
          "https://opensheet.elk.sh/1zKo5ALernti3UMF7fE6lmEivyDkDLoN0Iuq-kk63tDs/對帳單",
        );
        const sheetData = await response.json();

        orderData = sheetData.map((row) => ({
          name: row["姓名"],
          totalAmount: parseInt(row["總額"].replace(/[^\d]/g, "")),
          deposit: parseInt(row["已付訂金"].replace(/[^\d]/g, "")),
          finalPayment: parseInt(row["尾款"].replace(/[^\d]/g, "")),
          eventCard: Number(row["場週滿額"] || 0),
          marketCard: Number(row["超市滿額"] || 0),
          items: row["商品"] ? row["商品"].split("、") : [],
        }));

        renderOrders();
      }

      searchInput.addEventListener("input", function () {
        renderOrders(this.value);
      });

      clearBtn.addEventListener("click", function () {
        searchInput.value = "";
        renderOrders("");
        searchInput.focus();
      });

      loadData();
    </script>
  </body>
</html>
